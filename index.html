<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoomBoom</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M8 5v14l11-7z"/>
        </svg>
        Boom<span>Boom</span>
        <button class="version-badge" id="open-roadmap" type="button" aria-haspopup="dialog" title="Voir le changelog">v...</button>
      </div>

      <nav class="nav-links" role="navigation" aria-label="Navigation principale">
        <button class="nav-link active" data-view="view-home" type="button" aria-current="page">Accueil</button>
        <button class="nav-link" data-view="view-films" type="button" aria-current="false">🎬 Films</button>
        <button class="nav-link" data-view="view-series" type="button" aria-current="false">📺 Séries</button>
        <button class="nav-link" data-view="view-collections" type="button" aria-current="false">🎭 Collections</button>
        <button class="nav-link" data-view="view-genres" type="button" aria-current="false">🎞️ Genres</button>
        <button class="nav-link" data-view="view-mcu" type="button" aria-current="false">✨ MCU</button>
      </nav>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" class="search" id="search" placeholder="Rechercher un titre…" autocomplete="off" />
      </div>

      <button class="profile-btn" id="profile-btn" type="button" aria-label="Menu compte">
        <span class="profile-avatar" id="profile-avatar">👤</span>
      </button>

    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main">

    <!-- Home View -->
    <section id="view-home" class="view active">
      <div id="home-hero" class="home-hero" aria-live="polite"></div>
      <div id="home-rows" class="home-rows"></div>
    </section>

    <!-- Films View -->
    <section id="view-films" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">Films</h2>
          <span class="count" id="movies-count"></span>
        </div>
        <div class="section-header-right">
          <div class="filter-chips" id="movies-status-filters"></div>
          <div class="filter-chips" id="movies-collection-filters"></div>
          <select class="filter-select filter-select-sm" id="movies-genre-select"><option value="">Tous les genres</option></select>
          <select class="filter-select filter-select-sm" id="movies-sort-select">
            <option value="default">Trier par…</option>
            <option value="date-desc">Date ↓</option>
            <option value="date-asc">Date ↑</option>
            <option value="rating-desc">Note ↓</option>
          </select>
          <button id="view-toggle-movies" class="view-toggle" type="button" aria-label="Changer le type d'affichage" title="Changer le type d'affichage"></button>
        </div>
      </div>
      <div class="grid" id="movies-grid"></div>
    </section>

    <!-- Séries View -->
    <section id="view-series" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">Séries</h2>
          <span class="count" id="series-count"></span>
        </div>
        <div class="section-header-right">
          <div class="filter-chips" id="series-status-filters"></div>
          <div class="filter-chips" id="series-collection-filters"></div>
          <select class="filter-select filter-select-sm" id="series-genre-select"><option value="">Tous les genres</option></select>
          <select class="filter-select filter-select-sm" id="series-sort-select">
            <option value="default">Trier par…</option>
            <option value="date-desc">Date ↓</option>
            <option value="date-asc">Date ↑</option>
            <option value="rating-desc">Note ↓</option>
          </select>
          <button id="view-toggle-series" class="view-toggle" type="button" aria-label="Changer le type d'affichage" title="Changer le type d'affichage"></button>
        </div>
      </div>
      <div class="grid" id="series-grid"></div>
    </section>

    <!-- Collections View -->
    <section id="view-collections" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">Collections</h2>
          <span class="count" id="collections-count"></span>
        </div>
      </div>
      <div id="collections-rows" class="home-rows"></div>
    </section>

    <!-- Genres View -->
    <section id="view-genres" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">Genres</h2>
          <span class="count" id="genres-count"></span>
        </div>
      </div>
      <div id="genres-rows" class="home-rows"></div>
    </section>

    <!-- MCU View -->
    <section id="view-mcu" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">MCU (Films + Séries)</h2>
          <span class="count" id="mcu-count"></span>
        </div>
      </div>
      <div class="grid" id="mcu-grid"></div>
    </section>

    <!-- Stats View -->
    <section id="view-stats" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">Statistiques</h2>
        </div>
      </div>
      <div id="stats-content" class="stats-content"></div>
    </section>

    <!-- Requests View -->
    <section id="view-requests" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">Demandes</h2>
          <span class="count" id="requests-count"></span>
        </div>
        <div class="section-header-right">
          <button class="btn-request-title" id="btn-request-title" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            Demander un titre
          </button>
        </div>
      </div>
      <div id="requests-grid" class="requests-grid"></div>
    </section>

    <!-- Admin View -->
    <section id="view-admin" class="view">
      <div class="section-header">
        <div class="section-head-left">
          <h2 class="section-title">🛡️ Admin — Demandes</h2>
          <span class="count" id="admin-requests-count"></span>
        </div>
        <div class="section-header-right">
          <select id="admin-filter-status" class="filter-select-sm">
            <option value="all">Tous</option>
            <option value="pending">En attente</option>
            <option value="approved">Approuvés</option>
            <option value="added">✓ Ajoutés</option>
            <option value="refused">✗ Refusés</option>
          </select>
        </div>
      </div>
      <div id="admin-requests-list" class="admin-requests-list"></div>
    </section>

  </main>

  <!-- ===== MEDIA DETAILS MODAL ===== -->
  <div id="details-modal" class="details-modal" hidden aria-hidden="true">
    <div class="details-modal-backdrop" data-close-details></div>
    <section class="details-modal-panel" role="dialog" aria-modal="true" aria-labelledby="details-modal-title">
      <button id="details-modal-close" class="details-modal-close" aria-label="Fermer">✕</button>
      <div id="details-modal-content" class="details-modal-content"></div>
    </section>
  </div>

  <!-- ===== LOADING SCREEN ===== -->
  <div id="loading" class="loading-screen" aria-live="polite" aria-label="Chargement en cours">
    <div class="loader-wrap">
      <div class="loader"></div>
      <p class="loader-text">Chargement…</p>
    </div>
  </div>

  <!-- ===== VIDEO PLAYER MODAL ===== -->
  <div id="video-modal" class="video-modal" hidden aria-hidden="true">
    <div class="video-modal-backdrop" data-close-video></div>
    <section class="video-modal-panel" role="dialog" aria-modal="true">
      <button id="video-modal-close" class="video-modal-close" aria-label="Fermer la vidéo">✕</button>
      <div class="video-player-wrap">
        <video id="video-player" class="video-player" controls controlsList="nodownload">
          <source id="video-source" src="" type="video/mp4" />
          Votre navigateur ne supporte pas la lecture vidéo.
        </video>
      </div>
      <div class="video-modal-footer">
        <div class="video-modal-footer-main">
          <h3 id="video-modal-title" class="video-modal-title"></h3>
          <p id="video-modal-meta" class="video-modal-meta" hidden></p>
        </div>
        <div id="video-modal-episode-nav" class="video-modal-episode-nav" hidden>
          <button id="video-prev-episode" class="video-episode-nav-btn" type="button">Episode precedent</button>
          <button id="video-next-episode" class="video-episode-nav-btn" type="button">Episode suivant</button>
        </div>
      </div>
    </section>
  </div>

  <!-- ===== SERIES EPISODES MODAL ===== -->
  <div id="series-modal" class="series-modal" hidden aria-hidden="true">
    <div class="series-modal-backdrop" data-close-modal></div>
    <section class="series-modal-panel" role="dialog" aria-modal="true" aria-labelledby="series-modal-title">
      <button id="series-modal-close" class="series-modal-close" aria-label="Fermer">✕</button>
      <div class="series-modal-head">
        <p class="series-kicker">Série</p>
        <h3 id="series-modal-title" class="series-modal-title"></h3>
        <p id="series-modal-meta" class="series-modal-meta"></p>
      </div>
      <div id="series-modal-content" class="series-modal-content"></div>
    </section>
  </div>

  <!-- ===== AUTH MODAL ===== -->
  <div id="auth-modal" class="auth-modal" hidden aria-hidden="true">
    <div class="auth-modal-backdrop" data-close-auth></div>
    <section class="auth-modal-panel" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <div class="auth-modal-head">
        <div class="auth-modal-head-text">
          <p class="auth-kicker">BoomBoom</p>
          <h2 id="auth-modal-title" class="auth-modal-title">Connexion</h2>
        </div>
        <button id="auth-modal-close" class="auth-modal-close" aria-label="Fermer">✕</button>
      </div>
      <div id="auth-modal-content" class="auth-modal-content"></div>
    </section>
  </div>

  <!-- ===== PROFILE DROPDOWN ===== -->
  <div id="profile-dropdown" class="profile-dropdown" hidden>
    <!-- Bloc connecté -->
    <div id="profile-logged-in" hidden>
      <p class="profile-email" id="profile-email"></p>
      <hr class="profile-sep" />
      <button class="profile-menu-item" id="profile-change-avatar" type="button">🖼️ Changer l'avatar</button>
      <button class="profile-menu-item" id="profile-nav-stats" type="button">📊 Mes stats</button>
      <button class="profile-menu-item" id="profile-nav-requests" type="button">🎬 Demander un titre</button>
      <button class="profile-menu-item profile-menu-admin" id="profile-nav-admin" type="button" hidden>🛡️ Admin</button>
      <hr class="profile-sep" />
      <button class="profile-menu-item" id="profile-signout" type="button">🚪 Déconnexion</button>
      <button class="profile-menu-item profile-menu-danger" id="profile-delete" type="button">🗑️ Supprimer le compte</button>
    </div>
    <!-- Bloc déconnecté -->
    <div id="profile-logged-out">
      <p class="profile-email">Non connecté</p>
      <hr class="profile-sep" />
      <button class="profile-menu-item" id="profile-open-auth" type="button">🔑 Se connecter</button>
    </div>
  </div>

  <!-- ===== TMDB SEARCH MODAL ===== -->
  <div id="tmdb-search-modal" class="tmdb-search-modal" hidden aria-hidden="true">
    <div class="tmdb-search-backdrop" data-close-tmdb></div>
    <section class="tmdb-search-panel" role="dialog" aria-modal="true" aria-labelledby="tmdb-search-title">
      <button id="tmdb-search-close" class="tmdb-search-close" aria-label="Fermer">✕</button>
      <div class="tmdb-search-head">
        <h3 id="tmdb-search-title">Ajouter un titre à ma bibliothèque</h3>
      </div>
      <div class="tmdb-search-form">
        <div class="tmdb-search-mode-wrap">
          <button class="tmdb-mode-btn active" id="tmdb-mode-query" type="button">Mots-clés</button>
          <button class="tmdb-mode-btn" id="tmdb-mode-id" type="button">ID TMDB</button>
        </div>
        <div class="tmdb-input-row">
          <input type="text" id="tmdb-search-input" class="tmdb-search-input"
            placeholder="Nom du film ou de la série…" autocomplete="off" />
          <select id="tmdb-id-type" class="filter-select filter-select-sm" hidden>
            <option value="movie">Film</option>
            <option value="tv">Série</option>
          </select>
          <button type="button" class="tmdb-search-btn" id="tmdb-search-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </div>
      </div>
      <div id="tmdb-search-results" class="tmdb-search-results"></div>
    </section>
  </div>

  <!-- ===== ROADMAP MODAL ===== -->
  <div id="roadmap-modal" class="roadmap-modal" hidden aria-hidden="true">
    <div class="roadmap-modal-backdrop" data-close-roadmap></div>
    <section class="roadmap-modal-panel" role="dialog" aria-modal="true" aria-labelledby="roadmap-modal-title">
      <button id="roadmap-modal-close" class="roadmap-modal-close" aria-label="Fermer">✕</button>
      <div class="roadmap-modal-head">
        <p class="roadmap-kicker">BoomBoom</p>
        <h2 id="roadmap-modal-title" class="roadmap-modal-title">Changelog</h2>
      </div>
      <div id="roadmap-modal-content" class="roadmap-modal-content"></div>
    </section>
  </div>

  <!-- ===== AVATAR PICKER MODAL ===== -->
  <div id="avatar-picker-modal" class="avatar-picker-modal" hidden aria-hidden="true">
    <div class="avatar-picker-backdrop" data-close-avatar></div>
    <section class="avatar-picker-panel" role="dialog" aria-modal="true" aria-labelledby="avatar-picker-title">
      <button id="avatar-picker-close" class="avatar-picker-close" aria-label="Fermer">✕</button>
      <h3 id="avatar-picker-title" class="avatar-picker-heading">Choisir un avatar</h3>
      <div class="avatar-picker-grid" id="avatar-picker-grid"></div>
      <button type="button" class="avatar-picker-save" id="avatar-picker-save">Sauvegarder</button>
    </section>
  </div>

  <!-- Firebase compat SDK v10 -->
  <script src="firebase.config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-module.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
