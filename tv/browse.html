<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomBoomMovie TV</title>
  <link rel="stylesheet" href="css/tv.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
  <div class="tv-loading" id="tv-loading">
    <div class="tv-spinner"></div>
    <div class="tv-loading-text">Chargement du catalogue…</div>
  </div>

  <!-- Top bar -->
  <header class="tv-topbar">
    <div class="tv-logo">Boom<span class="accent">Boom</span>Movie</div>
    <nav class="tv-topbar-nav">
      <button class="tv-nav-btn tv-focusable" data-filter="all">Accueil</button>
      <button class="tv-nav-btn tv-focusable" data-filter="movies">Films</button>
      <button class="tv-nav-btn tv-focusable" data-filter="series">Séries</button>
      <button class="tv-nav-btn tv-focusable" id="btn-logout">Déconnexion</button>
    </nav>
  </header>

  <!-- Hero -->
  <section class="tv-hero" id="tv-hero">
    <div class="tv-hero-bg" id="tv-hero-bg"></div>
    <div class="tv-hero-fade"></div>
    <div class="tv-hero-content">
      <h1 class="tv-hero-title" id="tv-hero-title">Chargement…</h1>
      <div class="tv-hero-meta" id="tv-hero-meta"></div>
      <p class="tv-hero-overview" id="tv-hero-overview"></p>
      <div class="tv-hero-actions">
        <button class="tv-btn primary tv-focusable" id="hero-play">
          ▶ Lire
        </button>
        <button class="tv-btn tv-focusable" id="hero-info">
          Plus d'infos
        </button>
      </div>
    </div>
  </section>

  <!-- Rows -->
  <main class="tv-rows" id="tv-rows"></main>

  <!-- Diag overlay (auto-masqué sauf en cas de blocage — voir tv-home.js) -->
  <div id="tv-diag" style="position:fixed;bottom:16px;right:16px;max-width:520px;padding:12px 16px;background:rgba(0,0,0,.82);border:1px solid #444;border-radius:8px;color:#f0ece4;font:13px/1.5 monospace;z-index:99999;display:none">
    <div style="color:#ffcf4d;font-weight:600;margin-bottom:6px">Diagnostic BoomBoomMovie TV</div>
    <div id="tv-diag-auth">🔑 Auth : …</div>
    <div id="tv-diag-api">📡 API : …</div>
    <div id="tv-diag-key">⌨️ Dernière touche : —</div>
    <div id="tv-diag-err" style="color:#ff7a7a;margin-top:4px"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Shared modules -->
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>

  <!-- TV modules -->
  <script src="js/tv-core.js"></script>
  <script src="js/tv-home.js"></script>
</body>
</html>
