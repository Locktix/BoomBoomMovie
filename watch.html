<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomBoomMovie — Lecture</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    body { overflow: hidden; }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loader"></div>
    <span class="loader-text">Chargement</span>
  </div>

  <!-- Player -->
  <div class="player-page">
    <div class="player-container">
      <!-- Video -->
      <video id="player-video" preload="auto"></video>

      <!-- Overlay -->
      <div class="player-overlay" id="player-overlay">
        <!-- Header -->
        <div class="player-header">
          <button class="player-back" id="player-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Retour</span>
          </button>
          <span class="player-title" id="player-title">Lecture en cours</span>
        </div>

        <!-- Center Controls -->
        <div class="player-center">
          <button class="player-center-btn" id="btn-rewind" title="Reculer 10s">
            <svg viewBox="0 0 24 24" fill="white">
              <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
              <text x="12" y="17" text-anchor="middle" font-size="7" fill="white" font-weight="bold">10</text>
            </svg>
          </button>

          <button class="player-center-btn play-pause" id="btn-center-play" title="Lecture / Pause">
            <svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
          </button>

          <button class="player-center-btn" id="btn-forward" title="Avancer 10s">
            <svg viewBox="0 0 24 24" fill="white">
              <path d="M11.5 8c2.65 0 5.05.99 6.9 2.6L22 7v9h-9l3.62-3.62C15.23 11.22 13.46 10.5 11.5 10.5c-3.54 0-6.55 2.31-7.6 5.5L1.53 15.22C2.92 11.03 6.85 8 11.5 8z"/>
              <text x="12" y="17" text-anchor="middle" font-size="7" fill="white" font-weight="bold">10</text>
            </svg>
          </button>
        </div>

        <!-- Bottom Controls -->
        <div class="player-controls">
          <!-- Progress Bar -->
          <div class="player-progress" id="player-progress">
            <div class="player-progress-buffered" id="progress-buffered"></div>
            <div class="player-progress-filled" id="progress-filled"></div>
            <div class="player-progress-thumb" id="progress-thumb"></div>
          </div>

          <!-- Controls Row -->
          <div class="player-controls-row">
            <button class="ctrl-btn" id="btn-play-pause" title="Lecture / Pause">
              <svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
            </button>

            <div class="volume-container">
              <button class="ctrl-btn" id="btn-volume" title="Volume">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="white"/>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
              </button>
              <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
            </div>

            <span class="player-time" id="player-time">0:00 / 0:00</span>

            <div class="player-controls-right">
              <button class="ctrl-btn" id="btn-fullscreen" title="Plein écran">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 3 21 3 21 9"/>
                  <polyline points="9 21 3 21 3 15"/>
                  <polyline points="21 3 14 10"/>
                  <polyline points="3 21 10 14"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
