<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomBoomMovie — Lecture</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4a843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body { overflow: hidden; }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loader"></div>
    <span class="loader-text">Chargement</span>
  </div>

  <!-- Player -->
  <div class="player-page">
    <div class="player-container">
      <!-- Video -->
      <video id="player-video" preload="auto"></video>

      <!-- Overlay -->
      <div class="player-overlay" id="player-overlay">
        <!-- Header -->
        <div class="player-header">
          <button class="player-back" id="player-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Retour</span>
          </button>
          <span class="player-title" id="player-title">Lecture en cours</span>
        </div>

        <!-- Center Controls -->
        <div class="player-center">
          <button class="player-center-btn" id="btn-rewind" title="Reculer 10s">
            <svg viewBox="0 0 24 24" fill="white">
              <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
              <text x="12" y="17" text-anchor="middle" font-size="7" fill="white" font-weight="bold">10</text>
            </svg>
          </button>

          <button class="player-center-btn play-pause" id="btn-center-play" title="Lecture / Pause">
            <svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
          </button>

          <button class="player-center-btn" id="btn-forward" title="Avancer 10s">
            <svg viewBox="0 0 24 24" fill="white">
              <path d="M11.5 8c2.65 0 5.05.99 6.9 2.6L22 7v9h-9l3.62-3.62C15.23 11.22 13.46 10.5 11.5 10.5c-3.54 0-6.55 2.31-7.6 5.5L1.53 15.22C2.92 11.03 6.85 8 11.5 8z"/>
              <text x="12" y="17" text-anchor="middle" font-size="7" fill="white" font-weight="bold">10</text>
            </svg>
          </button>
        </div>

        <!-- Bottom Controls -->
        <div class="player-controls">
          <!-- Progress Bar -->
          <div class="player-progress" id="player-progress">
            <div class="player-progress-buffered" id="progress-buffered"></div>
            <div class="player-progress-filled" id="progress-filled"></div>
            <div class="player-progress-thumb" id="progress-thumb"></div>
          </div>

          <!-- Controls Row -->
          <div class="player-controls-row">
            <button class="ctrl-btn" id="btn-play-pause" title="Lecture / Pause">
              <svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
            </button>

            <button class="ctrl-btn episode-nav-btn" id="btn-prev-ep" title="Épisode précédent" style="display:none">
              <svg viewBox="0 0 24 24" fill="white"><rect x="3" y="5" width="3" height="14"/><polygon points="21,5 9,12 21,19"/></svg>
            </button>
            <button class="ctrl-btn episode-nav-btn" id="btn-next-ep" title="Épisode suivant" style="display:none">
              <svg viewBox="0 0 24 24" fill="white"><rect x="18" y="5" width="3" height="14"/><polygon points="3,5 15,12 3,19"/></svg>
            </button>

            <div class="volume-container">
              <button class="ctrl-btn" id="btn-volume" title="Volume">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="white"/>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
              </button>
              <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
            </div>

            <span class="player-time" id="player-time">0:00 / 0:00</span>

            <div class="player-controls-right">
              <button class="ctrl-btn" id="btn-pip" title="Picture-in-Picture" style="display:none">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                  <rect x="12" y="9" width="8" height="6" rx="1" fill="white" opacity="0.4"/>
                </svg>
              </button>
              <button class="ctrl-btn" id="btn-shortcuts" title="Raccourcis clavier">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <rect x="2" y="6" width="20" height="12" rx="2"/>
                  <line x1="6" y1="10" x2="6" y2="10.01"/>
                  <line x1="10" y1="10" x2="10" y2="10.01"/>
                  <line x1="14" y1="10" x2="14" y2="10.01"/>
                  <line x1="18" y1="10" x2="18" y2="10.01"/>
                  <line x1="7" y1="14" x2="17" y2="14"/>
                </svg>
              </button>
              <div class="player-settings-wrap" id="player-settings-wrap">
                <button class="ctrl-btn" id="btn-settings" title="Paramètres">
                  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                  </svg>
                </button>
                <div class="player-settings-panel" id="settings-panel">
                  <div class="settings-section has-tracks" id="settings-speed">
                    <div class="settings-section-title">Vitesse</div>
                  </div>
                  <div class="settings-section" id="settings-audio"></div>
                  <div class="settings-section" id="settings-subs"></div>
                </div>
              </div>
              <button class="ctrl-btn" id="btn-fullscreen" title="Plein écran">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 3 21 3 21 9"/>
                  <polyline points="9 21 3 21 3 15"/>
                  <polyline points="21 3 14 10"/>
                  <polyline points="3 21 10 14"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- Shortcuts Overlay -->
      <div class="shortcuts-overlay" id="shortcuts-overlay">
        <div class="shortcuts-panel">
          <button class="shortcuts-close" id="shortcuts-close">&#10005;</button>
          <h3>Raccourcis clavier</h3>
          <div class="shortcuts-grid">
            <div class="shortcut-row"><kbd>Espace</kbd><span>Lecture / Pause</span></div>
            <div class="shortcut-row"><kbd>K</kbd><span>Lecture / Pause</span></div>
            <div class="shortcut-row"><kbd>&#8592;</kbd><span>Reculer 10s</span></div>
            <div class="shortcut-row"><kbd>&#8594;</kbd><span>Avancer 10s</span></div>
            <div class="shortcut-row"><kbd>&#8593;</kbd><span>Volume +</span></div>
            <div class="shortcut-row"><kbd>&#8595;</kbd><span>Volume -</span></div>
            <div class="shortcut-row"><kbd>F</kbd><span>Plein écran</span></div>
            <div class="shortcut-row"><kbd>M</kbd><span>Couper le son</span></div>
            <div class="shortcut-row"><kbd>Echap</kbd><span>Quitter</span></div>
            <div class="shortcut-row"><kbd>?</kbd><span>Ce panneau</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Next Episode Overlay -->
    <div class="next-episode-overlay" id="next-episode-overlay" style="display:none">
      <div class="next-episode-card">
        <div class="next-episode-label">Épisode suivant dans <span id="next-ep-countdown">10</span>s</div>
        <div class="next-episode-title" id="next-ep-title"></div>
        <div class="next-episode-buttons">
          <button class="btn-next-play" id="next-ep-play">Lire maintenant</button>
          <button class="btn-next-cancel" id="next-ep-cancel">Annuler</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/player.js"></script>
  <script src="js/tv-nav.js"></script>
</body>
</html>
