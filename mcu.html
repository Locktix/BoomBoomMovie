<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomBoomMovie — MCU Chronologie</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4a843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loader"></div>
    <span class="loader-text">Chargement</span>
  </div>

  <!-- Navbar -->
  <nav class="navbar scrolled">
    <a href="browse.html" class="logo">Boom<span class="accent">Boom</span>Movie<span class="dot"></span></a>
    <div class="nav-right" style="margin-left:auto">
      <a href="browse.html" class="btn-info" style="padding:8px 20px;font-size:0.85rem">← Retour</a>
    </div>
  </nav>

  <!-- MCU Content -->
  <main class="mcu-page">
    <div class="mcu-header">
      <h1>🛡️ Marvel Cinematic Universe</h1>
      <p class="mcu-subtitle">Ordre chronologique de l'histoire</p>
      <div class="mcu-toggle">
        <button class="mcu-toggle-btn active" data-order="chronological">Chronologique</button>
        <button class="mcu-toggle-btn" data-order="release">Date de sortie</button>
      </div>
    </div>
    <div class="mcu-timeline" id="mcu-timeline">
      <div class="loader" style="margin:60px auto"></div>
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/mcu.js"></script>
  <script src="js/tv-nav.js"></script>
</body>
</html>
